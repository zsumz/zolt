name: ci

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Zolt artifacts
        uses: actions/cache@v4
        with:
          path: .zolt/cache
          key: zolt-cache-${{ runner.os }}-${{ hashFiles('zolt.lock') }}
          restore-keys: |
            zolt-cache-${{ runner.os }}-

      - name: Cache npx packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-smoque-alpha
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Test workspace
        run: scripts/bootstrap-zolt-jvm test --workspace --all

      - name: Smoke packaged workflows
        run: scripts/smoke-smoque

  zap:
    name: zap distribution
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_EC2_METADATA_DISABLED: "true"
      DO_SPACES_BUCKET: ${{ vars.DO_SPACES_BUCKET }}
      DO_SPACES_ENDPOINT: ${{ vars.DO_SPACES_ENDPOINT }}
      ZOLT_DISTRIBUTION_ORIGIN: ${{ vars.ZOLT_DISTRIBUTION_ORIGIN || 'https://dist.zolt.sh' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          components: native-image
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Zolt artifacts
        uses: actions/cache@v4
        with:
          path: .zolt/cache
          key: zolt-cache-${{ runner.os }}-${{ hashFiles('zolt.lock') }}
          restore-keys: |
            zolt-cache-${{ runner.os }}-

      - name: Configure Spaces credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.DO_SPACES_REGION || 'us-east-1' }}

      - name: Build, verify, and publish zap distribution
        run: scripts/zap-distribution --publish --target linux-x64

      - name: Upload zap distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: zolt-zap-linux-x64
          path: |
            apps/zolt/target/release/zap/**
            apps/zolt/target/release/channels/zap.json
