name: benchmarks

on:
  push:
    branches:
      - benchmarks
  workflow_dispatch:
    inputs:
      modules:
        description: Number of generated library modules before the app.
        required: true
        default: "40"
        type: string
      repeat:
        description: Timed samples per workflow.
        required: true
        default: "5"
        type: string
      zolt_runtime:
        description: Zolt executable used for benchmark samples.
        required: true
        default: native
        type: choice
        options:
          - native
          - jvm
      include_gradle_daemon:
        description: Also measure Gradle with its daemon enabled.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  benchmark:
    name: generated workspace
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      BENCHMARK_DIR: target/benchmarks/competitors
      BENCHMARK_MODULES: ${{ github.event_name == 'workflow_dispatch' && inputs.modules || '3' }}
      BENCHMARK_REPEAT: ${{ github.event_name == 'workflow_dispatch' && inputs.repeat || '1' }}
      BENCHMARK_ZOLT_RUNTIME: ${{ github.event_name == 'workflow_dispatch' && inputs.zolt_runtime || 'jvm' }}
      BENCHMARK_INCLUDE_GRADLE_DAEMON: ${{ github.event_name == 'workflow_dispatch' && inputs.include_gradle_daemon || false }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prefer configured JDK tools
        run: printf '%s/bin\n' "$JAVA_HOME" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Cache Zolt artifacts
        uses: actions/cache@v4
        with:
          path: .zolt/cache
          key: zolt-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('zolt.lock') }}
          restore-keys: |
            zolt-cache-${{ runner.os }}-${{ runner.arch }}-
            zolt-cache-${{ runner.os }}-

      - name: Show benchmark tool versions
        run: |
          java --version
          javac -version
          mvn --version
          gradle --version

      - name: Build native Zolt
        if: env.BENCHMARK_ZOLT_RUNTIME == 'native'
        run: scripts/zap-distribution --target linux-x64

      - name: Select native Zolt
        if: env.BENCHMARK_ZOLT_RUNTIME == 'native'
        run: |
          printf 'ZOLT_BENCH_ZOLT=%s/apps/zolt/target/native/zolt\n' "$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          apps/zolt/target/native/zolt --version

      - name: Build JVM Zolt
        if: env.BENCHMARK_ZOLT_RUNTIME == 'jvm'
        run: scripts/bootstrap-zolt-jvm --no-progress package --workspace --member apps/zolt --cache-root .zolt/cache

      - name: Select JVM Zolt
        if: env.BENCHMARK_ZOLT_RUNTIME == 'jvm'
        run: |
          printf 'ZOLT_BENCH_ZOLT=%s/scripts/run-zolt-built\n' "$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          scripts/run-zolt-built --version

      - name: Run benchmark
        run: |
          args=(
            --modules "$BENCHMARK_MODULES"
            --repeat "$BENCHMARK_REPEAT"
            --work-dir "$BENCHMARK_DIR"
            --zolt "$ZOLT_BENCH_ZOLT"
          )
          if [[ "$BENCHMARK_INCLUDE_GRADLE_DAEMON" == "true" ]]; then
            args+=(--include-gradle-daemon)
          fi
          scripts/benchmark-competitors "${args[@]}"

      - name: Write job summary
        if: always()
        run: |
          {
            printf '## Zolt Benchmark\n\n'
            printf -- '- Ref: `%s`\n' "${GITHUB_REF_NAME}"
            printf -- '- Commit: `%s`\n' "${GITHUB_SHA}"
            printf -- '- Zolt runtime: `%s`\n' "$BENCHMARK_ZOLT_RUNTIME"
            printf -- '- Modules: `%s`\n' "$BENCHMARK_MODULES"
            printf -- '- Repeats: `%s`\n' "$BENCHMARK_REPEAT"
            printf -- '- Gradle daemon included: `%s`\n\n' "$BENCHMARK_INCLUDE_GRADLE_DAEMON"
            if [[ -f "$BENCHMARK_DIR/report.md" ]]; then
              cat "$BENCHMARK_DIR/report.md"
            else
              printf 'Benchmark report was not generated. Check the job logs and uploaded artifacts.\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zolt-benchmark-${{ env.BENCHMARK_ZOLT_RUNTIME }}-${{ env.BENCHMARK_MODULES }}-modules-${{ env.BENCHMARK_REPEAT }}-repeats
          path: |
            target/benchmarks/competitors/report.md
            target/benchmarks/competitors/summary.json
            target/benchmarks/competitors/samples.jsonl
            target/benchmarks/competitors/logs/**
          if-no-files-found: warn
