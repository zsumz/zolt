name: benchmarks

on:
  push:
    branches:
      - benchmarks
  workflow_dispatch:
    inputs:
      modules:
        description: Number of generated library modules before the app.
        required: true
        default: "100"
        type: string
      repeat:
        description: Timed samples per workflow.
        required: true
        default: "7"
        type: string
      zolt_source:
        description: Native Zolt binary source.
        required: true
        default: release
        type: choice
        options:
          - release
          - build
      release_channel:
        description: Release channel used when zolt_source is release.
        required: true
        default: zap
        type: choice
        options:
          - zap
          - stable
          - nightly
      release_version:
        description: Optional exact release version. Empty uses the channel latest.
        required: false
        default: ""
        type: string
      include_gradle_daemon:
        description: Also measure Gradle with its daemon enabled.
        required: true
        default: true
        type: boolean
      real_projects:
        description: Comma-separated real-project ids to run. Empty runs generated only.
        required: false
        default: ""
        type: string
      real_project_dry_run:
        description: Validate selected real-project lanes without cloning or timing.
        required: true
        default: false
        type: boolean
      real_project_sample_timeout:
        description: Per-command timeout for selected real-project lanes, in seconds.
        required: true
        default: "1800"
        type: string
      openai_reasoning_effort:
        description: Reasoning effort for optional OpenAI benchmark summary.
        required: true
        default: high
        type: choice
        options:
          - low
          - medium
          - high
          - xhigh

permissions:
  contents: read

jobs:
  benchmark:
    name: benchmark suite
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      BENCHMARK_DIR: target/benchmarks/competitors
      BENCHMARK_MODULES: ${{ github.event_name == 'workflow_dispatch' && inputs.modules || '40' }}
      BENCHMARK_REPEAT: ${{ github.event_name == 'workflow_dispatch' && inputs.repeat || '5' }}
      BENCHMARK_ZOLT_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.zolt_source || 'release' }}
      BENCHMARK_RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.release_channel || 'zap' }}
      BENCHMARK_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
      BENCHMARK_INCLUDE_GRADLE_DAEMON: ${{ github.event_name != 'workflow_dispatch' || inputs.include_gradle_daemon }}
      BENCHMARK_REAL_PROJECTS: ${{ github.event_name == 'workflow_dispatch' && inputs.real_projects || 'apache-commons-cli,spring-petclinic' }}
      BENCHMARK_REAL_PROJECT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.real_project_dry_run || false }}
      BENCHMARK_REAL_PROJECT_SAMPLE_TIMEOUT: ${{ github.event_name == 'workflow_dispatch' && inputs.real_project_sample_timeout || '1800' }}
      BENCHMARK_GRADLE_VERSION: "9.6.1"
      BENCHMARK_AI_SUMMARY: ${{ vars.BENCHMARK_AI_SUMMARY || 'true' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
      OPENAI_REASONING_EFFORT: ${{ github.event_name == 'workflow_dispatch' && inputs.openai_reasoning_effort || vars.OPENAI_REASONING_EFFORT || 'high' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java
        if: env.BENCHMARK_ZOLT_SOURCE == 'release'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up GraalVM
        if: env.BENCHMARK_ZOLT_SOURCE == 'build'
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Gradle
        run: |
          gradle_root="$RUNNER_TEMP/gradle"
          gradle_zip="$RUNNER_TEMP/gradle-${BENCHMARK_GRADLE_VERSION}-bin.zip"
          mkdir -p "$gradle_root"
          curl -fsSL "https://services.gradle.org/distributions/gradle-${BENCHMARK_GRADLE_VERSION}-bin.zip" -o "$gradle_zip"
          unzip -q "$gradle_zip" -d "$gradle_root"
          printf '%s/gradle-%s/bin\n' "$gradle_root" "$BENCHMARK_GRADLE_VERSION" >> "$GITHUB_PATH"

      - name: Prefer configured JDK tools
        run: printf '%s/bin\n' "$JAVA_HOME" >> "$GITHUB_PATH"

      - name: Cache Zolt artifacts
        if: env.BENCHMARK_ZOLT_SOURCE == 'build'
        uses: actions/cache@v6
        with:
          path: .zolt/cache
          key: zolt-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('zolt.lock') }}
          restore-keys: |
            zolt-cache-${{ runner.os }}-${{ runner.arch }}-
            zolt-cache-${{ runner.os }}-

      - name: Show benchmark tool versions
        run: |
          export PATH="$JAVA_HOME/bin:$PATH"
          java --version
          javac -version
          mvn --version
          gradle --version

      - name: Install released native Zolt
        if: env.BENCHMARK_ZOLT_SOURCE == 'release'
        run: |
          export PATH="$JAVA_HOME/bin:$PATH"
          export ZOLT_INSTALL_ROOT="$GITHUB_WORKSPACE/target/benchmarks/zolt-install"
          export ZOLT_INSTALL_CHANNEL="$BENCHMARK_RELEASE_CHANNEL"
          export ZOLT_INSTALL_TARGET=linux-x64
          if [[ -n "$BENCHMARK_RELEASE_VERSION" ]]; then
            export ZOLT_INSTALL_VERSION="$BENCHMARK_RELEASE_VERSION"
          fi
          scripts/install-zolt
          printf 'ZOLT_BENCH_ZOLT=%s/bin/zolt\n' "$ZOLT_INSTALL_ROOT" >> "$GITHUB_ENV"
          "$ZOLT_INSTALL_ROOT/bin/zolt" --version

      - name: Build native Zolt
        if: env.BENCHMARK_ZOLT_SOURCE == 'build'
        run: |
          export PATH="$JAVA_HOME/bin:$PATH"
          scripts/zap-distribution --target linux-x64

      - name: Select built native Zolt
        if: env.BENCHMARK_ZOLT_SOURCE == 'build'
        run: |
          printf 'ZOLT_BENCH_ZOLT=%s/apps/zolt/target/native/zolt\n' "$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          apps/zolt/target/native/zolt --version

      - name: Run benchmark
        run: |
          export PATH="$JAVA_HOME/bin:$PATH"
          artifact_name="zolt-benchmark-native-${BENCHMARK_ZOLT_SOURCE}-${BENCHMARK_MODULES}-modules-${BENCHMARK_REPEAT}-repeats"
          args=(
            --modules "$BENCHMARK_MODULES"
            --repeat "$BENCHMARK_REPEAT"
            --work-dir "$BENCHMARK_DIR"
            --zolt "$ZOLT_BENCH_ZOLT"
            --project-manifest docs/benchmarks/projects.json
            --real-project-sample-timeout "$BENCHMARK_REAL_PROJECT_SAMPLE_TIMEOUT"
            --artifact-name "$artifact_name"
          )
          if [[ "$BENCHMARK_INCLUDE_GRADLE_DAEMON" == "true" ]]; then
            args+=(--include-gradle-daemon)
          fi
          if [[ -n "$BENCHMARK_REAL_PROJECTS" ]]; then
            args+=(--real-projects "$BENCHMARK_REAL_PROJECTS")
          fi
          if [[ "$BENCHMARK_REAL_PROJECT_DRY_RUN" == "true" ]]; then
            args+=(--real-project-dry-run)
          fi
          scripts/benchmark-suite "${args[@]}"

      - name: Prepare benchmark summary files
        if: always()
        run: |
          if [[ -f "$BENCHMARK_DIR/suite-summary.json" ]]; then
            printf 'Benchmark suite summary prepared: %s/suite-summary.json\n' "$BENCHMARK_DIR"
          else
            printf 'Benchmark suite summary was not generated; skipping summary files.\n'
          fi

      - name: Prepare model benchmark summary
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ "$BENCHMARK_AI_SUMMARY" == "false" ]]; then
            printf 'Model summary disabled by BENCHMARK_AI_SUMMARY=false.\n'
            exit 0
          fi
          if [[ ! -f "$BENCHMARK_DIR/suite-summary.json" ]]; then
            printf 'Suite summary was not generated; skipping model summary.\n'
            exit 0
          fi
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            printf 'OPENAI_API_KEY is not configured; skipping model summary.\n'
            exit 0
          fi
          scripts/benchmark-openai-summary \
            --input "$BENCHMARK_DIR/suite-summary.json" \
            --output-json "$BENCHMARK_DIR/summary-ai.json" \
            --output-markdown "$BENCHMARK_DIR/summary-ai.md" \
            --model "$OPENAI_MODEL" \
            --reasoning-effort "$OPENAI_REASONING_EFFORT"

      - name: Write job summary
        if: always()
        run: |
          run_class="Exploratory benchmark"
          if [[ -f "$BENCHMARK_DIR/suite-summary.json" ]]; then
            run_class="$(
              python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("run", {}).get("classification") or "Exploratory benchmark")' \
                "$BENCHMARK_DIR/suite-summary.json"
            )"
          elif [[ "$BENCHMARK_MODULES" =~ ^[0-9]+$ && "$BENCHMARK_REPEAT" =~ ^[0-9]+$ ]]; then
            if (( BENCHMARK_MODULES < 20 || BENCHMARK_REPEAT < 3 )); then
              run_class="Smoke validation"
            elif (( BENCHMARK_MODULES >= 40 && BENCHMARK_REPEAT >= 5 )) && [[ "$BENCHMARK_INCLUDE_GRADLE_DAEMON" == "true" ]]; then
              run_class="Production-grade generated evidence"
            fi
          fi
          {
            printf '# Zolt Native Benchmark\n\n'
            printf '## GitHub Run\n\n'
            printf '| Field | Value |\n'
            printf '| --- | --- |\n'
            printf '| Run type | `%s` |\n' "$run_class"
            printf '| Ref | `%s` |\n' "${GITHUB_REF_NAME}"
            printf '| Commit | `%s` |\n' "${GITHUB_SHA}"
            printf '| Zolt source | `%s` |\n' "$BENCHMARK_ZOLT_SOURCE"
            if [[ "$BENCHMARK_ZOLT_SOURCE" == "release" ]]; then
              printf '| Release channel | `%s` |\n' "$BENCHMARK_RELEASE_CHANNEL"
              if [[ -n "$BENCHMARK_RELEASE_VERSION" ]]; then
                printf '| Release version | `%s` |\n' "$BENCHMARK_RELEASE_VERSION"
              else
                printf '| Release version | `channel latest` |\n'
              fi
            fi
            printf '| Modules before app | `%s` |\n' "$BENCHMARK_MODULES"
            printf '| Samples per repeated workflow | `%s` |\n' "$BENCHMARK_REPEAT"
            printf '| First clean build samples | `1` |\n'
            printf '| Gradle daemon included | `%s` |\n' "$BENCHMARK_INCLUDE_GRADLE_DAEMON"
            if [[ -n "$BENCHMARK_REAL_PROJECTS" ]]; then
              printf '| Real projects | `%s` |\n' "$BENCHMARK_REAL_PROJECTS"
              printf '| Real-project dry run | `%s` |\n' "$BENCHMARK_REAL_PROJECT_DRY_RUN"
              printf '| Real-project command timeout | `%s seconds` |\n' "$BENCHMARK_REAL_PROJECT_SAMPLE_TIMEOUT"
            fi
            printf '\n'
            if [[ -f "$BENCHMARK_DIR/summary-brief.md" ]]; then
              cat "$BENCHMARK_DIR/summary-brief.md"
              printf '\n'
              if [[ -f "$BENCHMARK_DIR/summary-ai.md" ]]; then
                printf '\n'
                cat "$BENCHMARK_DIR/summary-ai.md"
                printf '\n'
              fi
            elif [[ -f "$BENCHMARK_DIR/report.md" ]]; then
              sed '1,2d' "$BENCHMARK_DIR/report.md"
            else
              printf 'Benchmark report was not generated. Check the job logs and uploaded artifacts.\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zolt-benchmark-native-${{ env.BENCHMARK_ZOLT_SOURCE }}-${{ env.BENCHMARK_MODULES }}-modules-${{ env.BENCHMARK_REPEAT }}-repeats
          path: |
            target/benchmarks/competitors/summary-brief.md
            target/benchmarks/competitors/suite-summary.json
            target/benchmarks/competitors/llm-summary.md
            target/benchmarks/competitors/summary-ai.json
            target/benchmarks/competitors/summary-ai.md
            target/benchmarks/competitors/summary-ai-request.json
            target/benchmarks/competitors/generated-java-workspace/**
            target/benchmarks/competitors/real-projects/**
            !target/benchmarks/competitors/real-projects/*/checkout/**
            benchmarks/adapters/**
            docs/benchmarks/projects.json
          if-no-files-found: warn
