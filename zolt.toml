[workspace]
name = "zolt"
members = [
    "modules/zolt-model",
    "modules/zolt-framework-api",
    "modules/zolt-toml",
    "modules/zolt-repository",
    "modules/zolt-resolve",
    "modules/zolt-test-model",
    "modules/zolt-junit-client",
    "modules/zolt-build",
    "modules/zolt-test-runtime",
    "modules/zolt-native-image",
    "modules/zolt-toolchain",
    "modules/zolt-workspace",
    "modules/zolt-ide",
    "modules/zolt-quarkus",
    "modules/zolt-release",
    "modules/zolt-publish",
    "modules/zolt-policy",
    "modules/zolt-quality",
    "modules/zolt-tree",
    "modules/zolt-plan",
    "modules/zolt-explain",
    "modules/zolt-config",
    "modules/zolt-selfhost",
    "modules/zolt-init",
    "apps/zolt-junit-worker",
    "apps/zolt",
]
defaultMembers = ["apps/zolt"]

[repositories]
central = "https://repo.maven.apache.org/maven2"

[toolchain.java]
version = "21"
distribution = "graalvm-community"
features = ["native-image"]
policy = "prefer-managed"
