[project]
name = "zolt"
version = "0.1.0-SNAPSHOT"
group = "com.zolt"
java = "21"
main = "com.zolt.cli.ZoltCli"

[repositories]
central = "https://repo.maven.apache.org/maven2"

[dependencies]
"com.zolt:zolt-model" = { workspace = "modules/zolt-model" }
"com.zolt:zolt-build" = { workspace = "modules/zolt-build" }
"com.zolt:zolt-config" = { workspace = "modules/zolt-config" }
"com.zolt:zolt-explain" = { workspace = "modules/zolt-explain" }
"com.zolt:zolt-framework-api" = { workspace = "modules/zolt-framework-api" }
"com.zolt:zolt-ide" = { workspace = "modules/zolt-ide" }
"com.zolt:zolt-init" = { workspace = "modules/zolt-init" }
"com.zolt:zolt-policy" = { workspace = "modules/zolt-policy" }
"com.zolt:zolt-plan" = { workspace = "modules/zolt-plan" }
"com.zolt:zolt-publish" = { workspace = "modules/zolt-publish" }
"com.zolt:zolt-quality" = { workspace = "modules/zolt-quality" }
"com.zolt:zolt-quarkus" = { workspace = "modules/zolt-quarkus" }
"com.zolt:zolt-release" = { workspace = "modules/zolt-release" }
"com.zolt:zolt-repository" = { workspace = "modules/zolt-repository" }
"com.zolt:zolt-resolve" = { workspace = "modules/zolt-resolve" }
"com.zolt:zolt-selfhost" = { workspace = "modules/zolt-selfhost" }
"com.zolt:zolt-toml" = { workspace = "modules/zolt-toml" }
"com.zolt:zolt-tree" = { workspace = "modules/zolt-tree" }
"com.zolt:zolt-workspace" = { workspace = "modules/zolt-workspace" }
"info.picocli:picocli" = "4.7.6"

[test.dependencies]
"org.junit.platform:junit-platform-console-standalone" = "1.11.4"

[test.suites.cli-help-highlighting]
includeClassname = [
    "com.zolt.cli.HelpOptionHighlighterTest",
    "com.zolt.cli.HelpParameterHighlighterTest",
    "com.zolt.cli.HelpSynopsisHighlighterTest",
]
parallelSafe = true
maxWorkers = 2

[build]
source = "src/main/java"
test = "src/test/java"
output = "target/classes"
testOutput = "target/test-classes"

[native]
imageName = "zolt"
output = "target/native"
args = ["--no-fallback", "--native-image-info"]
