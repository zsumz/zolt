[project]
name = "vertx-postgres-crud"
version = "0.1.0"
group = "com.example"
java = "21"
main = "com.example.vertx.postgres.VertxPostgresCrudApplication"

[repositories]
central = "https://repo.maven.apache.org/maven2"

[platforms]
"io.vertx:vertx-stack-depchain" = "4.5.11"

[dependencies]
"io.vertx:vertx-core" = { exclusions = [
  { group = "io.netty", artifact = "netty-tcnative-boringssl-static" }
] }
"io.vertx:vertx-web" = {}
"io.vertx:vertx-pg-client" = {}
"org.slf4j:slf4j-simple" = "2.0.17"

[runtime.dependencies]
"com.ongres.scram:client" = "2.1"

[test.dependencies]
"org.junit.jupiter:junit-jupiter" = "5.11.4"
"org.junit.platform:junit-platform-console-standalone" = "1.11.4"

[build]
source = "src/main/java"
test = "src/test/java"
output = "target/classes"
testOutput = "target/test-classes"

[native]
imageName = "vertx-postgres-crud"
output = "target/native"
args = [
  "--no-fallback",
  "--initialize-at-run-time=io.netty.channel,io.netty.handler.ssl,io.netty.util.internal.shaded.org.jctools.util.UnsafeLongArrayAccess",
  "--initialize-at-build-time=io.netty.buffer.UnpooledByteBufAllocator,io.netty.buffer.AbstractByteBufAllocator,io.netty.buffer.Unpooled,io.netty.buffer.EmptyByteBuf,io.netty.util.internal.shaded.org.jctools.util.UnsafeAccess,org.slf4j"
]
