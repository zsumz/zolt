openapi: 3.1.0
info:
  title: Zolt Enterprise Canary API
  version: 0.1.0
paths:
  /status:
    get:
      operationId: status
      responses:
        "200":
          description: Enterprise canary status
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                  version:
                    type: string
                  platform:
                    type: string
                  greeting:
                    type: string
