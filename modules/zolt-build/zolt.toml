[project]
name = "zolt-build"
version = "0.1.0-SNAPSHOT"
group = "com.zolt"
java = "21"

[repositories]
central = "https://repo.maven.apache.org/maven2"

[dependencies]
"com.zolt:zolt-framework-api" = { workspace = "modules/zolt-framework-api" }
"com.zolt:zolt-junit" = { workspace = "modules/zolt-junit" }
"com.zolt:zolt-model" = { workspace = "modules/zolt-model" }
"com.zolt:zolt-repository" = { workspace = "modules/zolt-repository" }
"com.zolt:zolt-resolve" = { workspace = "modules/zolt-resolve" }
"com.zolt:zolt-test-model" = { workspace = "modules/zolt-test-model" }
"com.zolt:zolt-toml" = { workspace = "modules/zolt-toml" }

[test.dependencies]
"org.junit.platform:junit-platform-console-standalone" = "1.11.4"

[test.suites.test-execution]
includeClassname = [
    "com.zolt.build.coverage.CoverageServiceTest",
    "com.zolt.build.coverage.CoverageServiceValidationTest",
    "com.zolt.build.testruntime.execution.CurrentWorkerClasspathTest",
    "com.zolt.build.testruntime.execution.FrameworkTestSelectionMapperTest",
    "com.zolt.build.testruntime.execution.JunitConsoleArgumentsTest",
    "com.zolt.build.testruntime.execution.JunitLauncherClasspathTest",
    "com.zolt.build.testruntime.execution.TestConsoleFailureHandlerTest",
    "com.zolt.build.testruntime.TestJvmArgumentsTest",
    "com.zolt.build.profile.TestProfileMergerTest",
    "com.zolt.build.profile.TestProfileSummaryFormatterTest",
    "com.zolt.build.testruntime.execution.TestRuntimeInputBuilderTest",
    "com.zolt.build.testruntime.TestRunServiceFailureTest",
    "com.zolt.build.testruntime.TestRunServiceFrameworkRunnerTest",
    "com.zolt.build.testruntime.TestRunServiceRuntimeOptionsTest",
    "com.zolt.build.testruntime.TestRunServiceSelectionTest",
    "com.zolt.build.testruntime.TestRunServiceTest",
    "com.zolt.build.junit.PlainJunitWorkerPoolRunnerTest",
]

[build]
source = "src/main/java"
test = "src/test/java"
output = "target/classes"
testOutput = "target/test-classes"
